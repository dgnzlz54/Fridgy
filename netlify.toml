[build]
  publish = "."
  functions = "netlify/functions"

# Route /api/* to Netlify Functions
[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from   = "/api/ai"
  to     = "/.netlify/functions/ai"
  status = 200

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
