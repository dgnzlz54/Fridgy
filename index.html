<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A2840">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fridgy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>


:root
  --cream:#EDE5CC;--cream2:#F5EED8;--paper:#E4D9BE;
  --navy:#2B3D5A;--navy-dk:#1A2840;--navy-lt:#3D5478;
  --teal:#4A8F84;--teal-lt:#6BADA2;--teal-dk:#2E6B62;
  --gold:#B8922A;--gold-lt:#D4AE50;
  --sepia:#7A5C35;--sepia-lt:#A07848;--rule:#D4C4A0;
  --ink:#1E1812;--red:#B83030;--green:#2E7840;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:'Lora',serif;background:var(--navy-dk);color:var(--ink);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
.app-wrap{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--cream2);max-width:430px;margin:0 auto;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}
.header{background:var(--navy-dk);border-bottom:2.5px solid var(--teal);flex-shrink:0;display:flex;align-items:stretch;min-height:52px;}
.logo-zone{padding:8px 14px;border-right:1px solid var(--navy-lt);display:flex;align-items:center;flex:1;}
.h-logo{height:28px;width:auto;max-width:130px;object-fit:contain;display:block;}
.hactions{display:flex;}
.hbtn{background:none;border:none;color:var(--cream);padding:0 12px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;border-left:1px solid var(--navy-lt);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;opacity:.7;min-width:46px;}
.hbtn:active{opacity:1;background:var(--navy-lt);}
.hbtn svg{width:14px;height:14px;}
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:8px;}
.bnav{background:var(--navy-dk);border-top:2.5px solid var(--teal);display:flex;flex-shrink:0;}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 10px;cursor:pointer;color:var(--cream);opacity:.35;border-right:1px solid var(--navy-lt);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;min-height:52px;justify-content:center;transition:opacity .15s;}
.nv:last-child{border-right:none;}
.nv.active{opacity:1;color:var(--gold-lt);}
.nv svg{width:18px;height:18px;}
.screen{display:none;}
.screen.active{display:block;}
.page-banner{background:var(--navy);padding:16px 16px 13px;border-bottom:2.5px solid var(--teal);}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,1.7rem);font-weight:700;color:var(--cream);line-height:1.1;}
.page-title em{color:var(--gold-lt);font-style:italic;font-weight:400;}
.page-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.17em;text-transform:uppercase;color:rgba(237,229,204,.5);margin-top:3px;}
.teal-stripe{background:var(--teal);height:3px;border-bottom:1.5px solid var(--teal-dk);}
.sec{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.19em;text-transform:uppercase;color:var(--sepia);padding:0 16px;margin:14px 0 7px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--rule);}
.card{background:var(--cream2);border:1.5px solid var(--rule);margin:0 14px 8px;border-radius:4px;}
.stats{display:flex;margin:0 14px 10px;border:1.5px solid var(--rule);border-radius:4px;overflow:hidden;}
.stat{flex:1;padding:10px;border-right:1.5px solid var(--rule);text-align:center;}
.stat:last-child{border-right:none;}
.snum{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--navy);}
.slbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--sepia);margin-top:2px;}
.home-hero{background:var(--paper);padding:16px;border-bottom:1.5px solid var(--rule);display:flex;align-items:center;gap:12px;}
.hero-txt{flex:1;min-width:0;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,4.5vw,1.35rem);font-weight:700;color:var(--navy);line-height:1.2;}
.hero-title em{color:var(--teal-dk);font-style:italic;font-weight:400;}
.hero-rule{width:28px;height:2px;background:var(--teal);margin:7px 0;}
.hero-sub{font-family:'Lora',serif;font-style:italic;font-size:14px;color:var(--sepia);}
.hero-mascot{width:90px;height:auto;max-height:110px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 4px 14px rgba(30,24,18,.12));animation:mascotFloat 3s ease-in-out infinite;}
@keyframes mascotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.macro-rings{display:flex;gap:8px;padding:0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:2px;}
.macro-rings::-webkit-scrollbar{display:none;}
.mring-card{background:var(--cream2);border:1.5px solid var(--rule);border-radius:4px;padding:10px 12px;flex-shrink:0;display:flex;align-items:center;gap:10px;min-width:150px;}
.mring-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--sepia);}
.mring-cal{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--navy);margin-top:2px;}
.mring-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--sepia-lt);}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 2px;}
